<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据汇聚治理链路对账监控index</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="page-container">
    <!-- 页面标题 (左对齐、放大、白色文字、粗体、发光效果) -->
    <header class="page-header">
      <h1 class="page-title">数据汇聚治理链路对账监控</h1>
    </header>

    <!-- 整体汇聚情况区域 (4个指标卡片横向排列) -->
    <section class="overview-section">
      <div id="overview-panel" class="overview-panel">
        <!-- 4个指标卡片将在这里渲染 -->
      </div>
    </section>

    <!-- 桑基图区域 (全屏展示，calc(100vh - 整体汇聚情况高度 - 间距)) -->
    <section class="sankey-section">
      <div id="sankey-container" class="sankey-container">
        <!-- 桑基图将在这里渲染 -->
      </div>
    </section>

    <!-- 明细数据弹窗占位符 (遮罩层和弹窗容器) -->
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
      <div id="modal-container" class="modal-container">
        <!-- 弹窗内容将在这里渲染 -->
      </div>
    </div>

    <!-- 加载指示器 -->
    <div id="loading-indicator" class="loading-overlay" style="display: none;">
      <div class="loading-spinner"></div>
      <div class="loading-text">正在加载数据...</div>
    </div>

    <!-- 悬浮提示框 -->
    <div id="tooltip" class="tooltip" style="display: none;">
      <div class="tooltip-header">
        <span class="tooltip-title"></span>
      </div>
      <div class="tooltip-content"></div>
    </div>

    <!-- 错误提示容器 -->
    <div id="error-container" style="display: none;"></div>
  </div>

  <!-- D3.js v7 (Local) -->
  <script src="d3.v7.min.js"></script>
  <!-- d3-sankey (Local) -->
  <script src="d3-sankey-master/dist/d3-sankey.min.js"></script>
  
  <!-- 应用程序脚本 -->
  <script src="js/auth.js?v=1"></script>
  <script src="js/utils.js?v=3"></script>
  <script src="js/performance-validator.js?v=3"></script>
  <script src="js/data-loader-mysql.js?v=4"></script>
  <script src="js/data-transformer.js?v=3"></script>
  <script src="js/exception-rate-calculator.js?v=3"></script>
  <script src="js/overview-panel.js?v=3"></script>
  <script src="js/sankey-renderer.js?v=3"></script>
  <script src="js/table-renderer.js?v=3"></script>
  <script src="js/modal-renderer.js?v=3"></script>
  <script src="js/interaction-handler.js?v=3"></script>
  <script src="js/main.js?v=3"></script>
</body>
</html>
