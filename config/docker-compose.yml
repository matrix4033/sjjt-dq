version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: data-center-db
    environment:
      POSTGRES_DB: data_center
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/database/setup-database-postgresql.sql:/docker-entrypoint-initdb.d/01-setup.sql
      - ./scripts/database/update-table-structure.sql:/docker-entrypoint-initdb.d/02-update.sql
    networks:
      - data-center-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d data_center"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 数据中心应用
  app:
    build: .
    container_name: data-center-app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_NAME: data_center
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data-center-network
    restart: unless-stopped
    volumes:
      - ./:/app
    # 启动应用
    command: ["python", "src/api/app.py"]

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: data-center-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/data-center.conf:/etc/nginx/conf.d/default.conf
      - ../static:/usr/share/nginx/html
    depends_on:
      - app
    networks:
      - data-center-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  data-center-network:
    driver: bridge