# Nginx 配置文件
# 用于生产环境部署

server {
    listen 80;
    server_name your-domain.com;  # 修改为你的域名或服务器IP
    
    # 日志配置
    access_log /var/log/nginx/data-center-access.log;
    error_log /var/log/nginx/data-center-error.log;
    
    # 前端静态文件
    location / {
        root /var/www/data-center;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 缓存配置
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json;
}

# HTTPS 配置（生产环境启用）
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    ssl_certificate /path/to/your/certificate.crt;
    ssl_certificate_key /path/to/your/private.key;

    # SSL/TLS 加固配置（禁用RSA密钥交换，修复CVE-2025-8194等漏洞）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256:TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384:TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305';
    ssl_prefer_server_ciphers on;
    ssl_session_cache off;  # 禁用会话恢复，增强前向保密
    ssl_session_tickets off;  # 禁用会话票据

    # HSTS 头部（可选）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 其他配置同上...
}
