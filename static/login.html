<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 数据汇聚治理链路对账监控</title>
  <link rel="stylesheet" href="/src/css/main.css">
  <style>
    /* 登录页面专用样式 */
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--page-background);
      background-attachment: fixed;
      padding: 20px;
    }

    .login-card {
      background: linear-gradient(135deg, rgba(30, 35, 40, 0.95) 0%, rgba(25, 30, 35, 0.95) 100%);
      border: 1px solid rgba(0, 217, 255, 0.3);
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.8),
        0 0 0 1px rgba(0, 217, 255, 0.1) inset,
        0 0 20px rgba(0, 217, 255, 0.15);
      width: 100%;
      max-width: 420px;
      position: relative;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* 登录卡片顶部装饰条 */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, 
        var(--dept-color-start) 0%, 
        var(--front-color-start) 33%, 
        var(--warehouse-color-start) 66%, 
        var(--source-color-start) 100%);
      border-radius: 16px 16px 0 0;
      box-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-title {
      font-family: var(--font-family-display);
      font-size: 28px;
      font-weight: var(--font-weight-bold);
      letter-spacing: 1px;
      color: var(--text-primary);
      text-shadow: 0 0 12px rgba(0, 217, 255, 0.7);
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      font-weight: var(--font-weight-normal);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 14px;
      font-weight: var(--font-weight-medium);
      color: var(--text-primary);
      letter-spacing: 0.5px;
    }

    .form-input {
      background: rgba(40, 45, 50, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 15px;
      color: var(--text-primary);
      font-family: var(--font-family-base);
      transition: all var(--transition-duration) ease-in-out;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--dept-color-start);
      box-shadow: 0 0 0 2px rgba(0, 217, 255, 0.2);
      background: rgba(45, 50, 55, 0.9);
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .login-button {
      background: linear-gradient(135deg, var(--dept-color-start) 0%, var(--dept-color-end) 100%);
      border: none;
      border-radius: 8px;
      padding: 16px 24px;
      font-size: 16px;
      font-weight: var(--font-weight-semibold);
      color: var(--text-primary);
      cursor: pointer;
      transition: all var(--transition-duration) ease-in-out;
      text-shadow: 0 0 8px rgba(0, 0, 0, 0.3);
      box-shadow: 0 4px 12px rgba(0, 217, 255, 0.3);
      margin-top: 8px;
    }

    .login-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 217, 255, 0.4);
      filter: brightness(1.1);
    }

    .login-button:active {
      transform: translateY(0);
    }

    .login-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: 0 4px 12px rgba(0, 217, 255, 0.2);
    }

    .error-message {
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid rgba(255, 68, 68, 0.3);
      border-radius: 6px;
      padding: 12px 16px;
      color: var(--status-abnormal);
      font-size: 14px;
      margin-top: 16px;
      display: none;
      animation: slideIn var(--transition-duration) ease-out;
    }

    .loading-spinner-small {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: var(--text-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-right: 8px;
    }

    /* 响应式设计 */
    @media (max-width: 480px) {
      .login-card {
        padding: 32px 24px;
        margin: 16px;
      }
      
      .login-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">系统登录</h1>
        <p class="login-subtitle">数据汇聚治理链路对账监控系统</p>
      </div>
      
      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">用户名</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            class="form-input" 
            placeholder="请输入用户名"
            required
            autocomplete="username"
          >
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">密码</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            placeholder="请输入密码"
            required
            autocomplete="current-password"
          >
        </div>
        
        <button type="submit" class="login-button" id="loginButton">
          <span id="buttonText">登录</span>
        </button>
        
        <div class="error-message" id="errorMessage"></div>
      </form>
    </div>
  </div>

  <script>
    // 登录表单处理
    document.addEventListener('DOMContentLoaded', function() {
      const loginForm = document.getElementById('loginForm');
      const loginButton = document.getElementById('loginButton');
      const buttonText = document.getElementById('buttonText');
      const errorMessage = document.getElementById('errorMessage');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');

      // 检查是否已经登录
      checkAuthStatus();

      loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const username = usernameInput.value.trim();
        const password = passwordInput.value;
        
        // 基本验证
        if (!username || !password) {
          showError('请输入用户名和密码');
          return;
        }
        
        // 显示加载状态
        setLoading(true);
        hideError();
        
        try {
          const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              username: username,
              password: password
            })
          });
          
          const data = await response.json();
          
          if (data.success) {
            // 登录成功，跳转到主页
            window.location.href = data.redirect_url || '/';
          } else {
            // 登录失败，显示错误信息
            showError(data.message || '登录失败');
          }
        } catch (error) {
          console.error('Login error:', error);
          showError('网络连接错误，请稍后重试');
        } finally {
          setLoading(false);
        }
      });

      function setLoading(loading) {
        loginButton.disabled = loading;
        if (loading) {
          buttonText.innerHTML = '<span class="loading-spinner-small"></span>登录中...';
        } else {
          buttonText.textContent = '登录';
        }
      }

      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.style.display = 'block';
      }

      function hideError() {
        errorMessage.style.display = 'none';
      }

      async function checkAuthStatus() {
        try {
          const response = await fetch('/api/auth/status');
          const data = await response.json();
          
          if (data.success && data.authenticated) {
            // 已经登录，跳转到主页
            window.location.href = '/';
          }
        } catch (error) {
          // 忽略错误，继续显示登录页面
          console.log('Auth status check failed:', error);
        }
      }

      // 回车键提交表单
      usernameInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          passwordInput.focus();
        }
      });

      passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          loginForm.dispatchEvent(new Event('submit'));
        }
      });
    });
  </script>
</body>
</html>
